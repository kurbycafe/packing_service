<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>제품 카탈로그 관리자</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <style>
        .product-thumb { width: 50px; height: 50px; object-fit: cover; border-radius: 4px; }
        .accordion-button:not(.collapsed) { background-color: #e7f1ff; color: #0c63e4; }
        .category-actions { margin-left: auto; margin-right: 1rem; }
    </style>
</head>
<body class="bg-light">

<div class="container py-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2><i class="bi bi-journal-album"></i> 제품 카탈로그 생성기</h2>
        <div>
            <a th:href="@{/api/catalog/export/excel}" class="btn btn-outline-success">
                <i class="bi bi-file-earmark-excel"></i> Excel 다운로드
            </a>
            <a th:href="@{/api/catalog/export/pdf}" class="btn btn-outline-danger">
                <i class="bi bi-file-earmark-pdf"></i> PDF 다운로드
            </a>
        </div>
    </div>

    <div class="card mb-4 shadow-sm">
        <div class="card-body">
            <div class="input-group">
                <input type="text" id="newCategoryName" class="form-control" placeholder="새 카테고리명을 입력하세요 (예: 2024 신상품)">
                <button class="btn btn-primary" onclick="createCategory()">
                    <i class="bi bi-plus-circle"></i> 카테고리 추가
                </button>
            </div>
        </div>
    </div>

    <div class="accordion shadow-sm" id="catalogAccordion">
        <div th:if="${#lists.isEmpty(categories)}" class="text-center p-5 bg-white border rounded">
            <p class="text-muted">등록된 카테고리가 없습니다. 위에서 새 카테고리를 만들어보세요!</p>
        </div>

        <div class="accordion-item" th:each="category : ${categories}">
            <h2 class="accordion-header" th:id="'heading-' + ${category.id}">
                <button class="accordion-button collapsed" type="button" data-bs-toggle="collapse" th:data-bs-target="'#collapse-' + ${category.id}">
                    <strong th:text="${category.name}">카테고리명</strong>
                    <span class="ms-2 badge rounded-pill bg-secondary" th:text="${#lists.size(category.items)} + '개 상품'">0개</span>
                </button>
            </h2>
            <div th:id="'collapse-' + ${category.id}" class="accordion-collapse collapse" data-bs-parent="#catalogAccordion">
                <div class="accordion-body bg-white">
                    <div class="d-flex justify-content-end mb-3">
                        <button class="btn btn-sm btn-outline-primary" th:onclick="'openProductModal(' + ${category.id} + ')'">
                            <i class="bi bi-plus"></i> 상품 담기
                        </button>
                    </div>
                    
                    <table class="table table-hover align-middle">
                        <thead class="table-light">
                            <tr>
                                <th>순서</th>
                                <th>상품명</th>
                                <th>SKU</th>
                                <th>가격</th>
                                <th>관리</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="item, stat : ${category.items}">
                                <td th:text="${stat.count}">1</td>
                                <td>
                                    <div class="d-flex align-items-center">
                                        <img th:src="${item.product.imageUrl}" class="product-thumb me-2" alt="img">
                                        <span th:text="${item.product.name}">상품명</span>
                                    </div>
                                </td>
                                <td th:text="${item.product.sku}">SKU-001</td>
                                <td th:text="${item.product.price} + '원'">10,000</td>
                                <td>
                                    <button class="btn btn-sm btn-link text-danger" th:onclick="'removeItem(' + ${item.id} + ')'">삭제</button>
                                </td>
                            </tr>
                            <tr th:if="${#lists.isEmpty(category.items)}">
                                <td colspan="5" class="text-center text-muted">선택된 상품이 없습니다.</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

<div class="modal fade" id="productModal" tabindex="-1">
    <div class="modal-dialog modal-lg modal-dialog-scrollable">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">카탈로그 상품 추가</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <div class="input-group mb-3">
                    <span class="input-group-text"><i class="bi bi-search"></i></span>
                    <input type="text" id="productSearchInput" class="form-control" placeholder="상품명 또는 SKU로 검색..." onkeyup="filterProducts()">
                </div>
                <div id="modalProductList">
                    <table class="table">
                        <tbody id="productSearchResult">
                            </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>
    let activeCategoryId = null;

    // 1. 카테고리 생성
    function createCategory() {
        const name = document.getElementById('newCategoryName').value;
        if(!name) return alert('이름을 입력하세요.');

        fetch('/api/catalog/category', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ name: name })
        }).then(res => location.reload());
    }

    // 2. 상품 검색 모달 열기
    function openProductModal(categoryId) {
        activeCategoryId = categoryId;
        const modal = new bootstrap.Modal(document.getElementById('productModal'));
        modal.show();
        loadAllProducts(); // 전체 리스트 우선 로드
    }

    // 3. DB에서 상품 목록 가져오기
    function loadAllProducts() {
        fetch('/api/products')
            .then(res => res.json())
            .then(data => renderProductRows(data));
    }

    function renderProductRows(products) {
        const container = document.getElementById('productSearchResult');
        container.innerHTML = products.map(p => `
            <tr>
                <td><img src="${p.imageUrl}" class="product-thumb"></td>
                <td><strong>${p.name}</strong><br><small class="text-muted">${p.sku}</small></td>
                <td>${p.price}원</td>
                <td>
                    <button class="btn btn-sm btn-primary" onclick="addProductToCategory(${p.id})">추가</button>
                </td>
            </tr>
        `).join('');
    }

    // 4. 검색 필터 (클라이언트 사이드 예시, 서버 사이드 검색 권장)
    function filterProducts() {
        const val = document.getElementById('productSearchInput').value.toLowerCase();
        const rows = document.querySelectorAll('#productSearchResult tr');
        rows.forEach(row => {
            const text = row.innerText.toLowerCase();
            row.style.display = text.includes(val) ? '' : 'none';
        });
    }

    // 5. 상품을 카테고리에 매핑 저장
    function addProductToCategory(productId) {
        fetch(`/api/catalog/${activeCategoryId}/product/${productId}`, { method: 'POST' })
            .then(res => {
                if(res.ok) location.reload();
            });
    }

    // 6. 매핑 아이템 삭제
    function removeItem(itemId) {
        if(!confirm('삭제하시겠습니까?')) return;
        fetch(`/api/catalog/item/${itemId}`, { method: 'DELETE' })
            .then(res => location.reload());
    }
</script>
</body>
</html>
